<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio en développement</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050505;
      overflow: hidden;
      color: white;
      position: relative;
    }

    .background {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(140, 0, 255, 0.25), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(0, 200, 255, 0.25), transparent 40%),
                  #050505;
      z-index: 0;
    }

    .blur {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: pulse 5s infinite alternate;
    }

    .blur.one {
      background: #8b5cf6;
      top: 10%;
      left: 10%;
    }

    .blur.two {
      background: #06b6d4;
      bottom: 10%;
      right: 10%;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.2);
      }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 800px;
      padding: 40px;
    }

    .badge {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
</html>
